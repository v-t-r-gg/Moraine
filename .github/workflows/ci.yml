name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -p moraine-core -p moraine-cli -p moraine-mcp -p moraine-server -p moraine-service -- -D warnings
      - name: Test
        run: |
          cargo test -p moraine-core
          cargo build -p moraine-server -q
          cargo build -p moraine-cli -q
          cargo test -p moraine-cli
          cargo test -p moraine-mcp
          cargo test -p moraine-service

  # Workspace Cargo.toml rust-version must build (includes edition-2024 deps via rmcp).
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: MSRV check
        run: |
          cargo check -p moraine-core -p moraine-cli -p moraine-mcp -p moraine-server -p moraine-service

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  # Full Tauri package needs platform webview deps; keep this as a library/typecheck gate.
  tauri-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps for Tauri link check
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev
      - name: cargo check moraine-app
        run: cargo check -p moraine-app

  linux-release-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build CLI + service release suite
        env:
          MORAINE_GIT_COMMIT: ${{ github.sha }}
          MORAINE_TARGET_TRIPLE: x86_64-unknown-linux-gnu
          MORAINE_BUILD_PROFILE: release
        run: |
          set -euo pipefail
          cargo build --release -p moraine-cli -p moraine-service
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          OUT="dist/moraine-${VERSION}-linux-x86_64"
          mkdir -p "$OUT/bin" "$OUT/share/documentation" "$OUT/systemd"
          cp target/release/moraine target/release/moraine-service "$OUT/bin/"
          chmod 755 "$OUT/bin/"*
          cp crates/moraine-service/systemd/moraine-service.service.in "$OUT/systemd/"
          cp scripts/packaging/install.sh scripts/packaging/uninstall.sh "$OUT/"
          chmod 755 "$OUT/install.sh" "$OUT/uninstall.sh"
          cp LICENSE SECURITY.md docs/INSTALL.md docs/REDACTION.md "$OUT/share/documentation/" || true
          VERSION="$VERSION" python3 scripts/packaging/write_manifest.py "$OUT"
          tar -C dist -czf "dist/moraine-${VERSION}-linux-x86_64.tar.gz" "moraine-${VERSION}-linux-x86_64"
          (cd dist && sha256sum "moraine-${VERSION}-linux-x86_64.tar.gz" > "moraine-${VERSION}-linux-x86_64.tar.gz.sha256")
          CLEAN=$(mktemp -d)
          export HOME="$CLEAN" MORAINE_PREFIX="$CLEAN/.local" XDG_CONFIG_HOME="$CLEAN/.config" PATH="$CLEAN/.local/bin:$PATH"
          "dist/moraine-${VERSION}-linux-x86_64/install.sh"
          test -x "$MORAINE_PREFIX/bin/moraine"
          grep -q libexec/moraine/moraine-service "$XDG_CONFIG_HOME/systemd/user/moraine-service.service"
          ! grep -q '.cargo/bin' "$XDG_CONFIG_HOME/systemd/user/moraine-service.service"
          "$MORAINE_PREFIX/bin/moraine" version --json
          "dist/moraine-${VERSION}-linux-x86_64/uninstall.sh"
          test ! -e "$MORAINE_PREFIX/bin/moraine"
      - uses: actions/upload-artifact@v4
        with:
          name: moraine-linux-x86_64-suite
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
