name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy -p moraine-core -p moraine-cli -p moraine-mcp -p moraine-server -p moraine-service -p moraine-provision --all-targets -- -D warnings
      - name: Test
        run: |
          cargo test -p moraine-core
          cargo build -p moraine-server -q
          cargo build -p moraine-cli -q
          cargo test -p moraine-cli
          cargo test -p moraine-mcp
          cargo test -p moraine-service
          cargo test -p moraine-provision

  # Workspace Cargo.toml rust-version must build (includes edition-2024 deps via rmcp).
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2
      - name: MSRV check
        run: |
          cargo check -p moraine-core -p moraine-cli -p moraine-mcp -p moraine-server -p moraine-service -p moraine-provision

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build

  # Full Tauri package needs platform webview deps; keep this as a library/typecheck gate.
  tauri-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps for Tauri link check
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev
      - name: cargo check moraine-app
        run: cargo check -p moraine-app
      - name: Provision command tests
        run: cargo test -p moraine-app --test provision_commands

  linux-release-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: System deps for desktop release build
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev
      - name: Build complete Linux product (authoritative release script)
        env:
          MORAINE_GIT_COMMIT: ${{ github.sha }}
          MORAINE_TARGET_TRIPLE: x86_64-unknown-linux-gnu
          MORAINE_BUILD_PROFILE: release
        run: |
          set -euo pipefail
          ./scripts/build-linux-release.sh
          VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          ARCHIVE="dist/moraine-${VERSION}-linux-x86_64.tar.gz"
          test -f "$ARCHIVE"
          # Primary package must contain desktop
          tar -tzf "$ARCHIVE" | grep -E 'bin/moraine-app$'
          tar -tzf "$ARCHIVE" | grep -E 'bin/moraine$'
          tar -tzf "$ARCHIVE" | grep -E 'bin/moraine-service$'
          # Install smoke (user prefix)
          CLEAN=$(mktemp -d)
          STAGE=$(mktemp -d)
          tar -C "$STAGE" -xzf "$ARCHIVE"
          export HOME="$CLEAN" MORAINE_PREFIX="$CLEAN/.local" XDG_CONFIG_HOME="$CLEAN/.config" PATH="$CLEAN/.local/bin:$PATH"
          "$STAGE"/moraine-*/install.sh
          test -x "$MORAINE_PREFIX/bin/moraine"
          test -x "$MORAINE_PREFIX/lib/moraine/moraine-app" || test -x "$MORAINE_PREFIX/lib/moraine/moraine-app"*
          grep -q libexec/moraine/moraine-service "$XDG_CONFIG_HOME/systemd/user/moraine-service.service"
          ! grep -q '.cargo/bin' "$XDG_CONFIG_HOME/systemd/user/moraine-service.service"
          "$MORAINE_PREFIX/bin/moraine" version --json
          # Direct-path enable + self-test (product Ready needs live service; direct is ok for smoke)
          PROJ="$CLEAN/proj"
          mkdir -p "$PROJ"
          "$MORAINE_PREFIX/bin/moraine" enable --project "$PROJ" --skip-service --json
          "$MORAINE_PREFIX/bin/moraine" self-test --project "$PROJ" --skip-service --json
          test -d "$PROJ/.moraine"
          "$STAGE"/moraine-*/uninstall.sh
          test ! -e "$MORAINE_PREFIX/bin/moraine"
          # Ledger retained after uninstall
          test -d "$PROJ/.moraine"
      - uses: actions/upload-artifact@v4
        with:
          name: moraine-linux-x86_64-suite
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
